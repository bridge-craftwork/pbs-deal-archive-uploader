<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PBS Deal Archive Uploader</title>
<style>
  :root { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 14px; }
  body { margin: 0; padding: 10px; color: #1a1a2e; }
  h1 { font-size: 16px; margin: 0 0 8px; }
  .muted { color: #667; font-size: 12px; }
  #search { width: 100%; box-sizing: border-box; padding: 6px; margin: 6px 0;
            border: 1px solid #bbb; border-radius: 6px; }
  #list { max-height: 320px; overflow-y: auto; border: 1px solid #ddd;
          border-radius: 6px; padding: 4px; }
  #list label { display: flex; gap: 6px; align-items: center; padding: 3px 4px;
                border-radius: 4px; cursor: pointer; }
  #list label:hover { background: #eef3ee; }
  #list .count { margin-left: auto; color: #889; font-size: 12px; }
  fieldset { border: 1px solid #ddd; border-radius: 6px; margin: 10px 0; padding: 8px; }
  legend { font-size: 12px; color: #556; padding: 0 4px; }
  .row { display: flex; align-items: center; gap: 8px; margin: 6px 0; flex-wrap: wrap; }
  input[type="number"] { width: 70px; padding: 4px; border: 1px solid #bbb; border-radius: 4px; }
  button { padding: 8px 14px; border: 0; border-radius: 6px; cursor: pointer; font-weight: 600; }
  #upload { background: #106b3e; color: #fff; width: 100%; font-size: 15px; }
  #upload:disabled { background: #9bb5a6; cursor: default; }
  #download { background: #e8e8ee; margin-top: 6px; width: 100%; font-weight: 400; }
  #status { margin-top: 10px; padding: 8px; border-radius: 6px; background: #f4f4f8;
            font-size: 13px; white-space: pre-wrap; min-height: 2.4em; }
  #status.ok { background: #e4f5e9; }
  #status.err { background: #fde8e8; }
  #selectedSummary { font-size: 12px; color: #345; margin-top: 4px; }
</style>
</head>
<body>
  <h1>PBS Deal Archive Uploader</h1>
  <div class="muted">Pick scenarios, choose deals, upload to your BBO Deal archive.</div>

  <input id="search" type="search" placeholder="Filter scenarios…" />
  <div id="list">Loading scenario list…</div>
  <div id="selectedSummary"></div>

  <fieldset>
    <legend>Deals</legend>
    <div class="row">
      <label>Total deals <input id="total" type="number" min="1" max="100" value="12" /></label>
    </div>
    <div class="row">
      <label><input type="radio" name="mode" value="rand" checked /> Random</label>
      <label><input type="radio" name="mode" value="seq" /> Sequential, start at
        <input id="start" type="number" min="1" value="1" disabled /></label>
    </div>
  </fieldset>

  <button id="upload">Upload to BBO Deal archive</button>
  <button id="download">Download .lin instead</button>
  <div id="status">Idle.</div>
  <div class="muted" style="margin-top:6px; text-align:center">
    <a href="#" id="refresh">Refresh scenario data</a>
  </div>

  <script type="module" src="panel.js"></script>
</body>
</html>
